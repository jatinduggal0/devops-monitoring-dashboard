<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DevOps Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>🚀 DevOps Monitoring Dashboard</h1>
  <p class="subtitle">Real-Time Cloud Infrastructure Monitoring</p>

  <div id="systemStatus" class="status">Checking system...</div>
  <p id="lastUpdated" class="updated"></p>

  <div class="grid">

    <div class="card" onclick="goTo('cpu.html')">
      <div class="icon">🔥</div>
      <h3>CPU Usage</h3>
      <p id="cpu">--%</p>
    </div>

    <div class="card" onclick="goTo('memory.html')">
      <div class="icon">🧠</div>
      <h3>Memory</h3>
      <p id="memory">--%</p>
    </div>

    <div class="card" onclick="goTo('network.html')">
      <div class="icon">🌐</div>
      <h3>Network</h3>
      <p id="network">--</p>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
